{% extends "base.html" %}
{% block content %}
<p style="font-size:14px;color:#374151;">Hi {{ full_name }},</p>
<p style="font-size:14px;color:#374151;">Use the code below to sign in to AIRP. It expires in {{ expire_minutes }} minutes.</p>
<p style="font-size:28px;font-weight:700;letter-spacing:6px;color:#111827;text-align:center;padding:16px 0;">{{ otp_code }}</p>
<p style="font-size:12px;color:#9ca3af;">If you did not request this code, you can safely ignore this email.</p>
{% endblock %}
